name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew --no-daemon clean test verifyFatJar
      - uses: actions/upload-artifact@v7
        with:
          name: authserver-fatjar
          path: build/libs/authserver-*-all-optimized.jar
          if-no-files-found: error
